<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Visor</title>
  <style>
    body { font-family: sans-serif; background: #eee; }
    .grid { display: flex; flex-wrap: wrap; gap: 20px; }
    .item { background: #fff; padding: 10px; border: 1px solid #ccc; width: 300px; text-align: center; }
    img { max-width: 100%; height: auto; max-height: 200px; }
    h3 { font-size: 14px; margin: 10px 0 0; }
  </style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <script>
    const grid = document.getElementById('grid');
    for (let i = 1; i <= 16; i++) {
      const filename = `CATÁLOGO GACE-${i}-0.webp`;
      grid.innerHTML += `
        <div class="item">
          <img src="public/webp-trimmed/${filename}" />
          <h3>${filename}</h3>
        </div>
      `;
    }
  </script>
</body>
</html>
